<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Wishlist - BookAI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
  <div class="container">
    <a class="navbar-brand text-white" href="index.html">
      <i class="bi bi-book-half me-2" style="color:#f59e0b"></i>Book<span class="text-accent">AI</span>
    </a>
    <div class="glass-search-wrap mx-3">
      <i class="bi bi-search glass-search-icon"></i>
      <input type="text" id="global-search-input" class="glass-search-bar" placeholder="Search books...">
    </div>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto gap-2 align-items-center">
        <li class="nav-item"><a class="nav-link text-white-50" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link text-white-50" href="dashboard.html">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link text-white-50" href="recommendations.html">Recommendations</a></li>
        <li id="nav-admin" class="nav-item" style="display:none">
          <a href="admin.html"><span class="admin-badge">Admin</span></a>
        </li>
        <li class="nav-item" id="nav-logout">
          <button class="btn btn-outline-danger btn-sm" onclick="logout()">Logout</button>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- HEADER -->
<div style="background:linear-gradient(135deg,#0f172a,#1e293b); padding:50px 0; color:white;">
  <div class="container">
    <h2 class="fw-black mb-1"><i class="bi bi-heart-fill me-2 text-danger"></i>My Wishlist</h2>
    <p class="text-white-50 mb-0">Books you've saved to read later</p>
  </div>
</div>

<div class="container py-5">
  <div id="wishlist-loading" class="loading-spinner">
    <div class="spinner-border text-primary"></div>
  </div>

  <div id="wishlist-empty" class="wishlist-empty" style="display:none">
    <i class="bi bi-heart text-muted"></i>
    <h4 class="text-muted">Your wishlist is empty</h4>
    <p class="text-muted">Browse books and click the ❤️ button to save them here.</p>
    <a href="index.html" class="btn btn-primary px-4 mt-2">
      <i class="bi bi-book me-2"></i>Browse Books
    </a>
  </div>

  <div id="wishlist-header" class="d-flex justify-content-between align-items-center mb-4" style="display:none!important">
    <h5 class="fw-bold text-muted" id="wishlist-count-label"></h5>
    <button class="btn btn-outline-danger btn-sm" onclick="clearAll()" id="clear-btn" style="display:none">
      <i class="bi bi-trash me-1"></i>Clear All
    </button>
  </div>

  <div id="wishlist-container" class="row"></div>
</div>

<footer class="text-center">
  <div class="container">
    <p class="mb-0 text-white-50 small">BookAI — Online Book Recommendation System</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
<script>
  requireAuth();
  if (isAdmin()) document.getElementById('nav-admin').style.display = 'block';

  let wishlistBooks = [];

  async function loadWishlist() {
    try {
      const { data } = await authFetch(`${API_BASE}/wishlist/my`);
      document.getElementById('wishlist-loading').style.display = 'none';
      if (!data.success || data.books.length === 0) {
        document.getElementById('wishlist-empty').style.display = 'block';
        return;
      }
      wishlistBooks = data.books;
      const ids = wishlistBooks.map(b => String(b._id));
      document.getElementById('wishlist-count-label').textContent = `${data.count} book(s) saved`;
      document.getElementById('wishlist-header').style.display = 'flex';
      document.getElementById('clear-btn').style.display = 'block';
      document.getElementById('wishlist-container').innerHTML =
        wishlistBooks.map(b => renderWishlistCard(b, ids)).join('');
    } catch {
      document.getElementById('wishlist-loading').style.display = 'none';
      document.getElementById('wishlist-container').innerHTML =
        '<div class="col-12 text-center text-danger py-4"><p>Could not load wishlist. Check server.</p></div>';
    }
  }

  function renderWishlistCard(book, ids) {
    const cover = book.cover_url && book.cover_url !== ''
      ? book.cover_url
      : `https://via.placeholder.com/200x280/667eea/ffffff?text=${encodeURIComponent((book.title||'').substring(0,10))}`;
    const link = getPlatformLink(book);
    return `
    <div class="col-lg-3 col-md-4 col-sm-6 mb-4" id="wish-card-${book._id}">
      <div class="card book-card h-100 shadow-sm">
        <div class="book-cover-wrap" onclick="window.location.href='book-details.html?id=${book._id}'" style="cursor:pointer">
          <img src="${cover}" class="card-img-top book-cover" alt="${book.title}"
            onerror="this.src='https://via.placeholder.com/200x280/667eea/ffffff?text=No+Cover'">
          <span class="genre-badge badge">${book.genre}</span>
          <button class="wishlist-btn active" onclick="event.stopPropagation();removeFromWishlist('${book._id}')" title="Remove from Wishlist">
            <i class="bi bi-heart-fill"></i>
          </button>
        </div>
        <div class="card-body d-flex flex-column">
          <h6 class="card-title fw-bold">${book.title}</h6>
          <p class="card-text text-muted small mb-1">by ${book.author}</p>
          <div class="mt-auto">
            <div class="d-flex align-items-center justify-content-between mb-2">
              <small>${renderStars(book.rating || 0)}</small>
              <span class="badge bg-primary">${(book.rating || 0).toFixed(1)}</span>
            </div>
            <div class="d-flex gap-2">
              <a href="book-details.html?id=${book._id}" class="btn btn-sm btn-outline-primary flex-fill">Details</a>
              <a href="${link}" target="_blank" class="btn btn-sm btn-outline-success flex-fill">Amazon</a>
            </div>
          </div>
        </div>
      </div>
    </div>`;
  }

  async function removeFromWishlist(bookId) {
    const { data } = await authFetch(`${API_BASE}/wishlist/remove/${bookId}`, { method: 'DELETE' });
    if (data.success) {
      const card = document.getElementById(`wish-card-${bookId}`);
      if (card) { card.style.opacity = '0'; card.style.transition = 'opacity 0.3s'; setTimeout(() => card.remove(), 300); }
      showToast('Removed from wishlist');
      wishlistBooks = wishlistBooks.filter(b => String(b._id) !== String(bookId));
      if (wishlistBooks.length === 0) {
        document.getElementById('wishlist-empty').style.display = 'block';
        document.getElementById('wishlist-header').style.display = 'none';
      }
    }
  }

  async function clearAll() {
    if (!confirm('Remove all books from wishlist?')) return;
    for (const book of wishlistBooks) {
      await authFetch(`${API_BASE}/wishlist/remove/${book._id}`, { method: 'DELETE' });
    }
    showToast('Wishlist cleared');
    loadWishlist();
  }

  loadWishlist();
</script>
</body>
</html>
