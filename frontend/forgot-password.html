<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - BookAI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
  <style>body{background:linear-gradient(135deg,#0f172a,#1e293b);min-height:100vh;display:flex;align-items:center;}</style>
</head>
<body>
<div class="container py-5">
  <div class="row justify-content-center"><div class="col-md-5">
    <div class="text-center mb-4"><h2 class="text-white fw-black"><i class="bi bi-book-half me-2" style="color:#f59e0b"></i>BookAI</h2></div>
    <div class="card auth-card p-4"><div class="card-body">
      <div class="text-center mb-4">
        <div class="rounded-circle bg-primary d-inline-flex p-3 mb-3"><i class="bi bi-key fs-3 text-white"></i></div>
        <h4 class="fw-bold">Forgot Password?</h4>
        <p class="text-muted small">Enter your email to receive an OTP.</p>
      </div>
      <div id="alert-box" class="alert d-none"></div>
      <form id="forgot-form">
        <div class="mb-4"><label class="form-label fw-semibold">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="you@example.com" required></div>
        <button type="submit" class="btn btn-primary w-100 py-2" id="submit-btn">
          <span id="btn-text">Send Reset Link</span>
          <span id="btn-spinner" class="spinner-border spinner-border-sm ms-2 d-none"></span>
        </button>
      </form>
      <div class="text-center mt-3"><a href="login.html" class="text-muted small"><i class="bi bi-arrow-left me-1"></i>Back to Login</a></div>
    </div></div>
  </div></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
<script>
document.getElementById('forgot-form').addEventListener('submit', async (e) => {
  e.preventDefault();

  const btn = document.getElementById('submit-btn');
  const spinner = document.getElementById('btn-spinner');
  const email = document.getElementById('email').value.trim();
  const box = document.getElementById('alert-box');

  btn.disabled = true;
  spinner.classList.remove('d-none');

  try {
    const res = await fetch(`${API_BASE}/auth/forgot-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });

    const data = await res.json();

    if (data.success) {
      box.className = 'alert alert-success';
      box.innerHTML = `<i class="bi bi-check-circle me-2"></i>${data.message}`;
      box.classList.remove('d-none');

      // 🚀 REDIRECT TO RESET PAGE
      setTimeout(() => {
        window.location.href = `reset-password.html?email=${email}`;
      }, 1500);

    } else {
      box.className = 'alert alert-danger';
      box.textContent = data.message;
      box.classList.remove('d-none');
    }

  } catch {
    box.className = 'alert alert-danger';
    box.textContent = 'Server connection failed.';
    box.classList.remove('d-none');
  }

  btn.disabled = false;
  spinner.classList.add('d-none');
});
</script>
</body>
</html>
