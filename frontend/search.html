<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search - BookAI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
  <div class="container">
    <a class="navbar-brand text-white" href="index.html">
      <i class="bi bi-book-half me-2" style="color:#f59e0b"></i>Book<span class="text-accent">AI</span>
    </a>
    <div class="glass-search-wrap mx-3">
      <i class="bi bi-search glass-search-icon"></i>
      <input type="text" id="global-search-input" class="glass-search-bar" placeholder="Search books...">
    </div>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto align-items-center gap-2">
        <li class="nav-item"><a class="nav-link text-white-50" href="index.html">Home</a></li>
        <li class="nav-item" id="nav-dashboard" style="display:none">
          <a class="nav-link text-white-50" href="dashboard.html">Dashboard</a>
        </li>
        <li class="nav-item" id="nav-wishlist" style="display:none">
          <a class="nav-link text-white-50" href="wishlist.html"><i class="bi bi-heart me-1"></i>Wishlist</a>
        </li>
        <li class="nav-item" id="nav-login">
          <a href="login.html"><button class="btn btn-outline-light btn-sm">Login</button></a>
        </li>
        <li class="nav-item" id="nav-logout" style="display:none">
          <button class="btn btn-outline-danger btn-sm" onclick="logout()">Logout</button>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- SEARCH HERO — Glassmorphism -->
<div style="background:linear-gradient(135deg,#0f172a,#1e293b); padding:50px 0; color:white;">
  <div class="container text-center">
    <h2 class="fw-bold mb-3"><i class="bi bi-search me-2 text-warning"></i>Search Books</h2>
    <p class="text-white-50 mb-4">Search by title, author or description</p>
    <div class="row justify-content-center">
      <div class="col-md-7">
        <div class="hero-glass-search">
          <div class="input-group">
            <input type="text" id="search-input" class="form-control border-0 text-white"
              placeholder="Try 'Harari', 'psychology', 'Harry Potter'..."
              onkeyup="if(event.key==='Enter') performSearch()">
            <button class="btn btn-warning fw-bold px-4" onclick="performSearch()">
              <i class="bi bi-search me-1"></i>Search
            </button>
          </div>
        </div>
      </div>
    </div>
    <div class="mt-4" id="genre-pills-row">
      <span class="text-white-50 me-2 small">Filter by Genre:</span>
      <div class="d-inline-block" id="genre-pills-container">
        <div class="spinner-border spinner-border-sm text-warning"></div>
      </div>
    </div>
  </div>
</div>

<!-- RESULTS -->
<div class="container py-5">
  <div id="results-header" class="mb-4" style="display:none">
    <h5 id="results-count" class="text-muted fw-semibold"></h5>
  </div>
  <div id="results-container" class="row">
    <div class="loading-spinner"><div class="spinner-border text-primary"></div></div>
  </div>
</div>

<footer class="text-center">
  <div class="container">
    <p class="mb-0 text-white-50 small">BookAI — Online Book Recommendation System</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
<script>
  let currentGenre  = 'All';
  let wishlistIds   = [];

  async function initSearch() {
    if (isLoggedIn()) {
      try {
        const { data } = await authFetch(`${API_BASE}/wishlist/my`);
        if (data.success) wishlistIds = data.books.map(b => String(b._id));
      } catch {}
    }
    await buildGenrePills();
    // Pre-fill from URL
    const params = new URLSearchParams(window.location.search);
    const q = params.get('q');
    if (q) document.getElementById('search-input').value = q;
    performSearch();
  }

  async function buildGenrePills() {
    const genres    = await loadGenres();
    const container = document.getElementById('genre-pills-container');
    container.innerHTML =
      `<a class="genre-pill active" onclick="setGenre('All',this)">All</a>` +
      genres.map(g => `<a class="genre-pill" onclick="setGenre('${g}',this)">${g}</a>`).join('');
  }

  function setGenre(genre, el) {
    currentGenre = genre;
    document.querySelectorAll('.genre-pill').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    performSearch();
  }

  async function performSearch() {
    const q         = document.getElementById('search-input').value.trim();
    const container = document.getElementById('results-container');
    const header    = document.getElementById('results-header');
    container.innerHTML = '<div class="loading-spinner"><div class="spinner-border text-primary"></div></div>';
    const params = new URLSearchParams();
    if (q) params.append('q', q);
    if (currentGenre !== 'All') params.append('genre', currentGenre);
    try {
      const url = (q || currentGenre !== 'All')
        ? `${API_BASE}/books/search?${params}`
        : `${API_BASE}/books`;
      const res  = await fetch(url);
      const data = await res.json();
      header.style.display = 'block';
      if (data.success && data.books.length > 0) {
        document.getElementById('results-count').innerHTML =
          `<i class="bi bi-book me-2"></i>Found <strong>${data.books.length}</strong> book(s)${q ? ` for "<em>${q}</em>"` : ''}`;
        container.innerHTML = data.books.map(b => renderBookCard(b, wishlistIds)).join('');
      } else {
        document.getElementById('results-count').textContent = 'No results found';
        container.innerHTML = `
          <div class="col-12 text-center py-5 text-muted">
            <i class="bi bi-search display-3 mb-3 d-block"></i>
            <h5>No books found for "${q || currentGenre}"</h5>
            <button class="btn btn-primary mt-2" onclick="clearSearch()">Show All Books</button>
          </div>`;
      }
    } catch {
      container.innerHTML = '<div class="col-12 text-center text-danger py-4"><p>Server error. Start the backend.</p></div>';
    }
  }

  function clearSearch() {
    document.getElementById('search-input').value = '';
    currentGenre = 'All';
    document.querySelectorAll('.genre-pill').forEach(p => p.classList.remove('active'));
    const first = document.querySelector('.genre-pill');
    if (first) first.classList.add('active');
    performSearch();
  }

  initSearch();
</script>
</body>
</html>
