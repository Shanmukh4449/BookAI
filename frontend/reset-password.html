<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - BookAI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
  <style>
    body{
      background:linear-gradient(135deg,#0f172a,#1e293b);
      min-height:100vh;
      display:flex;
      align-items:center;
    }
  </style>
</head>

<body>
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">

      <div class="text-center mb-4">
        <h2 class="text-white fw-black">
          <i class="bi bi-book-half me-2" style="color:#f59e0b"></i>BookAI
        </h2>
      </div>

      <div class="card auth-card p-4">
        <div class="card-body">

          <h4 class="fw-bold mb-4 text-center">Reset Password via OTP</h4>

          <div id="alert-box" class="alert d-none"></div>

          <form id="reset-form">

            <!-- EMAIL -->
            <div class="mb-3">
              <label class="form-label fw-semibold">Email</label>
              <input type="email" id="email" class="form-control" required>
            </div>

            <!-- OTP -->
            <div class="mb-3">
              <label class="form-label fw-semibold">OTP</label>
              <input type="text" id="otp" class="form-control" placeholder="Enter 6-digit OTP" required>
            </div>

            <!-- PASSWORD -->
            <div class="mb-3">
              <label class="form-label fw-semibold">New Password</label>
              <input type="password" id="new-password" class="form-control" required minlength="6">
            </div>

            <!-- CONFIRM -->
            <div class="mb-3">
              <label class="form-label fw-semibold">Confirm Password</label>
              <input type="password" id="confirm-password" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 mb-2">
              Reset Password
            </button>

            <!-- RESEND BUTTON -->
            <button type="button" id="resend-btn" class="btn btn-outline-warning w-100">
              Resend OTP
            </button>

          </form>

        </div>
      </div>

    </div>
  </div>
</div>

<script src="app.js"></script>

<script>
const box = document.getElementById('alert-box');
const resendBtn = document.getElementById('resend-btn');

let timer = 30;
let interval = null;

// 🔁 RESEND OTP
resendBtn.addEventListener('click', async () => {
  const email = document.getElementById('email').value;

  if (!email) {
    showMsg('Enter email first', 'danger');
    return;
  }

  try {
    const res = await fetch(`${API_BASE}/auth/resend-otp`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });

    const data = await res.json();
    showMsg(data.message, 'success');
    startTimer();

  } catch {
    showMsg('Failed to resend OTP', 'danger');
  }
});

// ⏳ TIMER
function startTimer() {
  resendBtn.disabled = true;
  timer = 30;

  interval = setInterval(() => {
    resendBtn.innerText = `Resend OTP (${timer}s)`;
    timer--;

    if (timer < 0) {
      clearInterval(interval);
      resendBtn.disabled = false;
      resendBtn.innerText = "Resend OTP";
    }
  }, 1000);
}

// 🔐 RESET PASSWORD
document.getElementById('reset-form').addEventListener('submit', async (e) => {
  e.preventDefault();

  const email = document.getElementById('email').value;
  const otp   = document.getElementById('otp').value;
  const np    = document.getElementById('new-password').value;
  const cp    = document.getElementById('confirm-password').value;

  if (np !== cp) {
    showMsg('Passwords do not match', 'danger');
    return;
  }

  try {
    const res = await fetch(`${API_BASE}/auth/reset-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email,
        otp,
        newPassword: np
      })
    });

    const data = await res.json();

    if (data.success) {
      showMsg(data.message, 'success');
      setTimeout(() => window.location.href = 'login.html', 2000);
    } else {
      showMsg(data.message, 'danger');
    }

  } catch {
    showMsg('Server error', 'danger');
  }
});

// ALERT HELPER
function showMsg(msg, type) {
  box.className = `alert alert-${type}`;
  box.textContent = msg;
  box.classList.remove('d-none');
}
</script>

</body>
</html>
